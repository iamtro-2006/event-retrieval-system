backend: milvus

milvus:
  host: localhost
  port: 19530
  collection_name: keyframes_clip_vitb16_quickgelu
  consistency_level: Bounded
  search_params:
    metric_type: IP
    params:
      ef: 64

faiss:
  index_path: data/database/faiss_hnsw_clip_vitl16_siglip_256/keyframes.faiss
  metadata_path: data/database/faiss_hnsw_clip_vitl16_siglip_256/metadata.csv
  ef_search: 64
  threads: 8
  vector_cache_mode: memmap
  vector_cache_dtype: float32
  vector_cache_path: data/database/faiss_hnsw_clip_vitl16_siglip_256/vectors_fp32.npy

model:
  name: ViT-B-16-quickgelu
  pretrained: dfn2b
  device: auto
  precision: fp32
  normalize: true
  compile: false
paths:
  keyframes_root: data/processed/keyframes
  videos_root: data/raw/videos
  map_keyframe_path: data/processed/map_keyframes
search:
  candidate_multiplier: 3
  default_top_k: 20
  max_top_k: 200
ui:
  surrounding_radius: 5
  max_surrounding_radius: 10
translate:
  enabled_default: true
  source: vi
  target: en
speech:
  model_size: base
  device: cpu
  compute_type: int8
  lazy_load: true
debug:
  profile: false
